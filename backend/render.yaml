services:
  - type: web
    name: churchmanager-backend
    env: python
    region: frankfurt
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && if [ -n \"$DATABASE_URL\" ]; then python manage.py migrate; fi"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level info"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: churchmanager-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://votre-app.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://votre-app.vercel.app"

databases:
  - name: churchmanager-db
    databaseName: churchmanager
    user: churchmanager
    region: frankfurt
    plan: free
