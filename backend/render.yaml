services:
  - type: web
    name: churchmanager-backend
    env: python
    region: frankfurt
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --preload --log-level info"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: churchmanager-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://votre-app.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://votre-app.vercel.app"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: churchmanager-db
    databaseName: churchmanager
    user: churchmanager
    region: frankfurt
    plan: free
